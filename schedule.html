<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Schedule - LIFE LOG Factory</title>
    <style>
        /* フッターを常に一番下に固定するための設定 */
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            background-color: #f9f9f9; /* カレンダーに合うように少しグレーの背景に */
        }

        /* ページ全体のレイアウト */
        .schedule-page-section {
            flex: 1; 
            padding: 100px 20px 60px; /* ヘッダー分の余白 */
            width: 100%;
            max-width: 800px; /* カレンダーの幅に合わせる */
            margin: 0 auto;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <header class="header">
       <div class="header-logo">
            <a href="index.html">
                <img src="assets/img/LLF-img/LLF taitoru black.svg" alt="logo">
            </a>
        </div>
        <nav class="header-nav">
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="about.html">About</a></li>
                <li><a href="bremons.html">BREMONS</a></li>
                <li><a href="https://bb54125213.github.io/">ID</a></li>
                </ul>
        </nav>
    </header>

    <section class="schedule-page-section">
        <div class="service-header" style="margin-bottom: 30px;">
            <h1 class="service-main-title">Schedule</h1>
            <hr class="divider">
        </div>
        
        <div class="custom-calendar-wrapper">
            <div class="calendar-header">
                <button id="prev-month" class="cal-btn">&lt;</button>
                <h2 id="calendar-month-year">2026年 3月</h2>
                <button id="next-month" class="cal-btn">&gt;</button>
            </div>
            <table class="calendar-table">
                <thead>
                    <tr>
                        <th style="color: #e63946;">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th style="color: #007bff;">土</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                    </tbody>
            </table>
            
            <div id="calendar-details" class="calendar-details">
                <p class="details-placeholder">日付をクリックすると予定やニュースが表示されます。</p>
            </div>
            
            <div class="calendar-list-section" style="margin-top: 40px; padding-top: 20px; border-top: 2px dashed #eee;">
                <h3 style="color: #0d1b3f; margin-bottom: 15px; text-align: center;">過去の履歴・一覧</h3>
                <div class="tab-buttons" style="display: flex; gap: 10px; margin-bottom: 20px; overflow-x: auto; padding-bottom: 10px; justify-content: center;">
                    <button class="filter-tab" data-type="ALL">すべて</button>
                    <button class="filter-tab" data-type="ACTIVITY">ACTIVITY</button>
                    <button class="filter-tab" data-type="EVENT">EVENT</button>
                    <button class="filter-tab" data-type="NEWS">NEWS</button>
                </div>
                <ul class="news-list" id="filtered-event-list">
                    </ul>
            </div>
        </div>
        <div class="more-link-wrapper" style="margin-top: 40px; text-align: right;">
            <a href="index.html" class="more-link">>>Home</a>
        </div>
    </section>

    <footer class="footer">
        <div class="footer-left">
            <img src="assets/img/LLF-img/LLF taitoru black.svg" alt="Main Logo" class="footer-logo">
            <img src="assets/img/LLF-img/nagasaki-u.png" alt="Sub Logo" class="footer-logo">
        </div>

        <div class="footer-right">
            <a href="https://www.youtube.com/@LifeLogFactory/videos" target="_blank"><img src="assets/img/sns-icon/youtube.png" alt="YouTube"></a>
            <a href="https://x.com/LifeLogFactory_" target="_blank"><img src="assets/img/sns-icon/x.png" alt="X"></a>
            <a href="https://www.instagram.com/lifelogfactory/" target="_blank"><img src="assets/img/sns-icon/instagram.png" alt="Instagram"></a>
            <a href="https://lin.ee/oURBvB8" target="_blank"><img src="assets/img/sns-icon/LINE.png" alt="LINE"></a>
            <a href="https://script.google.com/macros/s/AKfycby5fofJ_EMAWnpYDXLFLfQQD89Ta7gb0ZajMTjx9HeFeAIohgQDOg_k8JvXb3VVCsOz/exec" target="_blank" class="admin-link">Admin</a>
        </div>
    </footer>

    <script src="./assets/js/script.js" defer></script>
</body>
</html>
