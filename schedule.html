<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <title>Schedule - LIFE LOG Factory</title>
    <meta property="og:site_name" content="LIFE LOG Factory">
    <meta property="og:title" content="Schedule | LIFE LOG Factory">
    <meta property="og:description" content="LIFE LOG Factoryの活動日程やイベントスケジュール、過去の活動履歴はこちらから確認できます。">
    <meta property="og:url" content="https://life-log-factory.github.io/schedule.html"> 
    <meta property="og:image" content="https://life-log-factory.github.io/assets/img/LLF-img/ogp-image.jpg">
    <meta property="og:type" content="website">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Schedule | LIFE LOG Factory">
    <meta name="twitter:description" content="LIFE LOG Factoryの活動日程やイベントスケジュール、過去の活動履歴はこちらから確認できます。">
    <meta name="twitter:image" content="https://life-log-factory.github.io/assets/img/LLF-img/ogp-image.jpg">
    <link rel="icon" href="./assets/img/LLF-img/favicon.png">
    <link rel="apple-touch-icon" href="./assets/img/LLF-img/favicon.png">
    <style>
        /* フッターを常に一番下に固定するための設定 */
        html, body {
            height: 100%;
            margin: 0;
        }
        body {
            display: flex;
            flex-direction: column;
            background-color: #f9f9f9; /* カレンダーに合うように少しグレーの背景に */
        }

        /* ページ全体のレイアウト */
        .schedule-page-section {
            flex: 1; 
            padding: 100px 20px 60px; /* ヘッダー分の余白 */
            width: 100%;
            max-width: 800px; /* カレンダーの幅に合わせる */
            margin: 0 auto;
            box-sizing: border-box;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    <section class="schedule-page-section">
        <div class="service-header" style="margin-bottom: 30px;">
            <h1 class="service-main-title">Schedule</h1>
            <hr class="divider">
        </div>
        
        <div class="custom-calendar-wrapper">
            <div class="calendar-header">
                <button id="prev-month" class="cal-btn">&lt;</button>
                <h2 id="calendar-month-year">2026年 3月</h2>
                <button id="next-month" class="cal-btn">&gt;</button>
            </div>
            <table class="calendar-table">
                <thead>
                    <tr>
                        <th style="color: #e63946;">日</th><th>月</th><th>火</th><th>水</th><th>木</th><th>金</th><th style="color: #007bff;">土</th>
                    </tr>
                </thead>
                <tbody id="calendar-body">
                    </tbody>
            </table>
            
            <div id="calendar-details" class="calendar-details">
                <p class="details-placeholder">日付をクリックすると予定やニュースが表示されます。</p>
            </div>
            
            <div class="calendar-list-section" style="margin-top: 40px; padding-top: 20px; border-top: 2px dashed #eee;">
                <h3 style="color: #0d1b3f; margin-bottom: 15px; text-align: center;">過去の履歴・一覧</h3>
                <div class="tab-buttons" style="display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 20px; justify-content: center;">
                    <button class="filter-tab" data-type="ALL">すべて</button>
                    <button class="filter-tab" data-type="ACTIVITY">ACTIVITY</button>
                    <button class="filter-tab" data-type="EVENT">EVENT</button>
                    <button class="filter-tab" data-type="NEWS">NEWS</button>
                </div>
                <ul class="news-list" id="filtered-event-list">
                    </ul>
            </div>
        </div>
        <div class="more-link-wrapper" style="margin-top: 40px; text-align: right;">
            <a href="index.html" class="more-link">>>Home</a>
        </div>
    </section>

    <div id="footer-placeholder"></div>

    <script src="./assets/js/script.js" defer></script>
</body>
</html>
