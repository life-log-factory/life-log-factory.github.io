<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho:wght@400;500;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Shop - LIFE LOG Factory</title>
    <meta name="description" content="LIFE LOG Factoryが製作したグッズやアプリの一覧です。">
    <meta property="og:site_name" content="LIFE LOG Factory">
    <meta property="og:title" content="Shop | LIFE LOG Factory">
    <meta property="og:description" content="LIFE LOG Factoryが製作したグッズやアプリの一覧です。">
    <meta property="og:type" content="website">
    <link rel="icon" href="./assets/img/LLF-img/favicon.png">
    <link rel="apple-touch-icon" href="./assets/img/LLF-img/favicon.png">

    <style>
        .shop-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 0 20px 60px;
        }

        .shop-filters {
            margin-bottom: 32px;
        }
        .shop-search {
            width: 100%;
            box-sizing: border-box;
            padding: 12px 16px;
            border: 1px solid var(--llf-teal-200);
            border-radius: 24px;
            font-size: 0.95rem;
            margin-bottom: 14px;
        }
        .shop-search:focus {
            outline: none;
            border-color: var(--llf-primary);
        }
        .shop-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
        }
        .shop-tag-btn {
            border: 1px solid var(--llf-teal-200);
            background: var(--llf-white);
            color: var(--llf-primary);
            border-radius: 20px;
            padding: 6px 14px;
            font-size: 0.82rem;
            font-weight: bold;
            cursor: pointer;
            transition: background 0.15s, color 0.15s;
        }
        .shop-tag-btn:hover {
            background: var(--llf-teal-100);
        }
        .shop-tag-btn.active {
            background: var(--llf-primary);
            color: #fff;
            border-color: var(--llf-primary);
        }

        .shop-empty {
            text-align: center;
            color: #888;
            padding: 40px 0;
            font-size: 0.9rem;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        .shop-card {
            background: var(--llf-white);
            border: 1px solid var(--llf-teal-200);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 104, 122, 0.08);
            display: flex;
            flex-direction: column;
        }
        .shop-card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #000;
        }
        .shop-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .shop-card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .shop-card-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
        }
        .shop-card-name {
            font-family: var(--llf-font-heading-en), var(--llf-font-heading-ja);
            font-size: 1.3rem;
            color: var(--llf-primary);
            margin: 0;
        }
        .shop-card-price {
            font-weight: bold;
            color: var(--llf-primary);
            white-space: nowrap;
            font-size: 1.05rem;
        }
        .shop-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .shop-badge-physical { background: var(--llf-teal-100); color: var(--llf-primary); }
        .shop-badge-app { background: #eafbe7; color: #2e7d32; }

        .shop-card-desc {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #444;
            flex: 1;
            margin: 0 0 16px;
        }

        .shop-cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            justify-content: space-between;
        }
        .shop-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 16px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 0.9rem;
            text-decoration: none;
            white-space: nowrap;
            transition: opacity 0.2s, transform 0.15s;
        }
        .shop-btn:hover { transform: translateY(-1px); }
        .shop-btn-primary {
            background: var(--llf-primary);
            color: #fff;
        }
        .shop-btn-primary:hover { opacity: 0.9; }
        .shop-btn-disabled {
            background: #eee;
            color: #999;
            cursor: default;
        }
        .shop-btn-secondary {
            padding: 10px 0;
            color: var(--llf-primary);
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: underline;
        }

        .shop-os-hint {
            width: 100%;
            font-size: 0.78rem;
            color: #777;
            line-height: 1.6;
            margin-bottom: 10px;
            padding-bottom: 10px;
            border-bottom: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="service-section" style="padding-top: 100px;">
        <div class="shop-section">
            <div class="service-header fade-in-target">
                <div class="service-title-group">
                    <h1 class="service-main-title">Shop</h1>
                </div>
                <hr class="divider">
            </div>

            <div class="shop-filters fade-in-target">
                <input type="text" id="shop-search" class="shop-search" placeholder="キーワードで検索（商品名・説明）">
                <div class="shop-tags" id="shop-tags"></div>
            </div>

            <div class="shop-grid" id="shop-grid"></div>
            <p class="shop-empty" id="shop-empty" style="display:none;">該当する商品・アプリが見つかりませんでした。</p>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./assets/js/script.js" defer></script>
    <script src="./assets/js/products-data.js"></script>
    <script>
        function detectOS() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return 'ios';
            if (/Android/.test(ua)) return 'android';
            return 'desktop';
        }

        function appHint() {
            const os = detectOS();
            if (os === 'ios') {
                return '📱 iPhoneの方: 開いた後、共有ボタン（□に↑）から「ホーム画面に追加」でアプリのように使えます。';
            }
            if (os === 'android') {
                return '📱 Androidの方: 開くと画面下または上部に「インストール」の案内が出ます。';
            }
            return '💻 PCの方: そのままブラウザで開きます。';
        }

        function yen(n) {
            return '¥' + n.toLocaleString('ja-JP');
        }

        function renderCard(p) {
            const badge = p.type === 'physical'
                ? '<span class="shop-badge shop-badge-physical">グッズ</span>'
                : '<span class="shop-badge shop-badge-app">アプリ / 無料</span>';

            const priceLabel = p.type === 'physical' ? yen(p.price) : '無料';

            let cta = '';
            if (p.type === 'physical') {
                cta = p.status === 'available' && p.buyUrl
                    ? `<a class="shop-btn shop-btn-primary" href="${p.buyUrl}" target="_blank" rel="noopener">購入する</a>`
                    : `<span class="shop-btn shop-btn-disabled">準備中</span>`;
            } else {
                cta = `<a class="shop-btn shop-btn-primary" href="${p.appUrl}">ダウンロード / 開く</a>`;
            }

            const detailLink = p.detailUrl
                ? `<a class="shop-btn shop-btn-secondary" href="${p.detailUrl}">くわしく見る</a>`
                : '';

            const osHint = p.type === 'app' ? `<div class="shop-os-hint">${appHint()}</div>` : '';

            return `
                <div class="shop-card">
                    <div class="shop-card-image"><img src="${p.image}" alt="${p.name}"></div>
                    <div class="shop-card-body">
                        ${badge}
                        <div class="shop-card-top">
                            <h2 class="shop-card-name">${p.name}</h2>
                            <span class="shop-card-price">${priceLabel}</span>
                        </div>
                        <p class="shop-card-desc">${p.description}</p>
                        ${osHint}
                        <div class="shop-cta-row">
                            ${cta}
                            ${detailLink}
                        </div>
                    </div>
                </div>
            `;
        }

        // --- タグ絞り込み・キーワード検索 ---
        const gridEl = document.getElementById('shop-grid');
        const emptyEl = document.getElementById('shop-empty');
        const searchEl = document.getElementById('shop-search');
        const tagsEl = document.getElementById('shop-tags');

        const allTags = [...new Set(PRODUCTS.flatMap((p) => p.tags || []))];
        const activeTags = new Set();

        function renderTagButtons() {
            tagsEl.innerHTML = allTags.map((tag) => `<button type="button" class="shop-tag-btn" data-tag="${tag}">${tag}</button>`).join('');
            tagsEl.querySelectorAll('.shop-tag-btn').forEach((btn) => {
                btn.addEventListener('click', () => {
                    const tag = btn.dataset.tag;
                    if (activeTags.has(tag)) {
                        activeTags.delete(tag);
                        btn.classList.remove('active');
                    } else {
                        activeTags.add(tag);
                        btn.classList.add('active');
                    }
                    update();
                });
            });
        }

        function matchesFilters(p) {
            const keyword = searchEl.value.trim().toLowerCase();
            const matchesKeyword = !keyword
                || p.name.toLowerCase().includes(keyword)
                || p.description.toLowerCase().includes(keyword);
            const matchesTags = [...activeTags].every((tag) => (p.tags || []).includes(tag));
            return matchesKeyword && matchesTags;
        }

        function update() {
            const filtered = PRODUCTS.filter(matchesFilters);
            gridEl.innerHTML = filtered.map(renderCard).join('');
            emptyEl.style.display = filtered.length ? 'none' : 'block';
        }

        searchEl.addEventListener('input', update);
        renderTagButtons();
        update();
    </script>
</body>
</html>
