<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho:wght@400;500;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Shop - LIFE LOG Factory</title>
    <meta name="description" content="LIFE LOG Factoryが製作したグッズやアプリの一覧です。">
    <meta property="og:site_name" content="LIFE LOG Factory">
    <meta property="og:title" content="Shop | LIFE LOG Factory">
    <meta property="og:description" content="LIFE LOG Factoryが製作したグッズやアプリの一覧です。">
    <meta property="og:type" content="website">
    <link rel="icon" href="./assets/img/LLF-img/favicon.png">
    <link rel="apple-touch-icon" href="./assets/img/LLF-img/favicon.png">

    <style>
        .shop-section {
            max-width: 1000px;
            margin: 0 auto;
            padding: 100px 20px 60px;
        }
        .shop-lead {
            text-align: center;
            font-size: 1rem;
            line-height: 1.8;
            color: #333;
            max-width: 640px;
            margin: 0 auto 40px;
        }

        .shop-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
            gap: 28px;
        }

        .shop-card {
            background: var(--llf-white);
            border: 1px solid var(--llf-teal-200);
            border-radius: 16px;
            overflow: hidden;
            box-shadow: 0 8px 24px rgba(0, 104, 122, 0.08);
            display: flex;
            flex-direction: column;
        }
        .shop-card-image {
            width: 100%;
            aspect-ratio: 1 / 1;
            overflow: hidden;
            background: #000;
        }
        .shop-card-image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }
        .shop-card-body {
            padding: 20px;
            display: flex;
            flex-direction: column;
            flex: 1;
        }
        .shop-card-top {
            display: flex;
            justify-content: space-between;
            align-items: baseline;
            gap: 10px;
            margin-bottom: 8px;
        }
        .shop-card-name {
            font-family: var(--llf-font-heading-en), var(--llf-font-heading-ja);
            font-size: 1.3rem;
            color: var(--llf-primary);
            margin: 0;
        }
        .shop-card-price {
            font-weight: bold;
            color: var(--llf-primary);
            white-space: nowrap;
            font-size: 1.05rem;
        }
        .shop-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: bold;
            padding: 3px 10px;
            border-radius: 20px;
            margin-bottom: 10px;
        }
        .shop-badge-physical { background: var(--llf-teal-100); color: var(--llf-primary); }
        .shop-badge-app { background: #eafbe7; color: #2e7d32; }

        .shop-card-desc {
            font-size: 0.9rem;
            line-height: 1.7;
            color: #444;
            flex: 1;
            margin: 0 0 16px;
        }

        .shop-cta-row {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
        }
        .shop-btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 10px 20px;
            border-radius: 24px;
            font-weight: bold;
            font-size: 0.9rem;
            text-decoration: none;
            transition: opacity 0.2s, transform 0.15s;
        }
        .shop-btn:hover { transform: translateY(-1px); }
        .shop-btn-primary {
            background: var(--llf-primary);
            color: #fff;
        }
        .shop-btn-primary:hover { opacity: 0.9; }
        .shop-btn-disabled {
            background: #eee;
            color: #999;
            cursor: default;
        }
        .shop-btn-secondary {
            color: var(--llf-primary);
            font-size: 0.85rem;
            font-weight: bold;
            text-decoration: underline;
        }

        .shop-os-hint {
            width: 100%;
            font-size: 0.78rem;
            color: #777;
            line-height: 1.6;
            margin-top: 4px;
            padding-top: 10px;
            border-top: 1px dashed #eee;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <section class="shop-section">
        <div class="service-header fade-in-target" style="text-align:center; margin-bottom: 10px;">
            <h1 class="service-main-title" style="font-size: 2.2rem;">Shop</h1>
            <hr class="divider" style="max-width: 200px; margin: 15px auto 0;">
        </div>
        <p class="shop-lead">
            LIFE LOG Factoryが製作したグッズやアプリをご紹介します。
        </p>

        <div class="shop-grid" id="shop-grid"></div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./assets/js/script.js" defer></script>
    <script src="./assets/js/products-data.js"></script>
    <script>
        function detectOS() {
            const ua = navigator.userAgent;
            if (/iPhone|iPad|iPod/.test(ua)) return 'ios';
            if (/Android/.test(ua)) return 'android';
            return 'desktop';
        }

        function appHint() {
            const os = detectOS();
            if (os === 'ios') {
                return '📱 iPhoneの方: 開いた後、共有ボタン（□に↑）から「ホーム画面に追加」でアプリのように使えます。';
            }
            if (os === 'android') {
                return '📱 Androidの方: 開くと画面下または上部に「インストール」の案内が出ます。';
            }
            return '💻 PCの方: そのままブラウザで開きます。';
        }

        function yen(n) {
            return '¥' + n.toLocaleString('ja-JP');
        }

        function renderCard(p) {
            const badge = p.type === 'physical'
                ? '<span class="shop-badge shop-badge-physical">グッズ</span>'
                : '<span class="shop-badge shop-badge-app">アプリ / 無料</span>';

            const priceLabel = p.type === 'physical' ? yen(p.price) : '無料';

            let cta = '';
            if (p.type === 'physical') {
                cta = p.status === 'available' && p.buyUrl
                    ? `<a class="shop-btn shop-btn-primary" href="${p.buyUrl}" target="_blank" rel="noopener">購入する</a>`
                    : `<span class="shop-btn shop-btn-disabled">準備中</span>`;
            } else {
                cta = `<a class="shop-btn shop-btn-primary" href="${p.appUrl}">ダウンロード / 開く</a>`;
            }

            const detailLink = p.detailUrl
                ? `<a class="shop-btn shop-btn-secondary" href="${p.detailUrl}">くわしく見る</a>`
                : '';

            const osHint = p.type === 'app' ? `<div class="shop-os-hint">${appHint()}</div>` : '';

            return `
                <div class="shop-card">
                    <div class="shop-card-image"><img src="${p.image}" alt="${p.name}"></div>
                    <div class="shop-card-body">
                        ${badge}
                        <div class="shop-card-top">
                            <h2 class="shop-card-name">${p.name}</h2>
                            <span class="shop-card-price">${priceLabel}</span>
                        </div>
                        <p class="shop-card-desc">${p.description}</p>
                        <div class="shop-cta-row">
                            ${cta}
                            ${detailLink}
                            ${osHint}
                        </div>
                    </div>
                </div>
            `;
        }

        document.getElementById('shop-grid').innerHTML = PRODUCTS.map(renderCard).join('');
    </script>
</body>
</html>
