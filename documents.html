<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="./assets/css/sanitize.css">
    <link rel="stylesheet" href="./assets/css/style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=BIZ+UDPMincho:wght@400;500;700&family=Montserrat:wght@400;500;700&display=swap" rel="stylesheet">
    <title>Documents | LIFE LOG Factory</title>
    <style>
        /* iframeのエリア（埋め込み枠）のみのデザイン変更 */
        .drive-embed-wrapper {
            margin-top: 40px;
            border: 4px solid var(--llf-primary); /* 枠線をサークルカラーに変更 */
            border-radius: 12px;
            overflow: hidden;
            box-shadow: 0 12px 28px rgba(0, 104, 122, 0.15); /* 枠に影を適用 */
        }
        
        .drive-embed-wrapper iframe {
            display: block;
            width: 100%;
            height: 700px; /* 視認性を上げるため高さを確保 */
        }

        @media (max-width: 768px) {
            .drive-embed-wrapper iframe {
                height: 450px;
            }
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>
    
    <section class="service-section" style="padding-top: 100px;">
        <div class="service-container">
            <div class="service-header fade-in-target">
                <div class="service-title-group">
                    <h1 class="service-main-title">Documents</h1>
                </div>
                <hr class="divider">
            </div>
            
            <div class="rules-content fade-in-target">
                <div class="drive-embed-wrapper">
                    <iframe src="https://drive.google.com/embeddedfolderview?id=1u4NvAb_j9dFVC_7zexurEFTNwjIxKTof#grid" frameborder="0"></iframe>
                </div>
            </div>
        </div>
    </section>

    <div id="footer-placeholder"></div>
    <script src="./assets/js/script.js" defer></script>
    
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            setTimeout(() => {
                document.querySelectorAll('.fade-in-target').forEach(el => {
                    el.classList.add('is-visible');
                });
            }, 100);
        });
    </script>
</body>
</html>
