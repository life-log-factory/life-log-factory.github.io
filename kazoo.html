        .kazoo-hero {
            position: relative;
            width: 100%;
            aspect-ratio: 16 / 9;
            max-height: 70vh;
            overflow: hidden;
            background: #000;
        }
        .kazoo-hero img {
            width: 100%;

            object-fit: cover;
            display: block;
            opacity: 0.9;
        }
        .kazoo-hero-title {
            position: absolute;
            inset: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            color: #fff;
            padding: 20px;
        }
        .kazoo-hero-title h1 {
            font-family: var(--llf-font-heading-en), var(--llf-font-heading-ja);
            font-size: clamp(2.5rem, 8vw, 5rem);
            margin: 0;
            letter-spacing: 0.05em;
            text-shadow: 0 4px 20px rgba(0,0,0,0.6);
        }
        .kazoo-hero-title p {
            margin: 10px 0 0;
            font-size: clamp(0.9rem, 2vw, 1.1rem);
            letter-spacing: 0.1em;
            text-shadow: 0 2px 10px rgba(0,0,0,0.6);
        }

        .kazoo-section {
            max-width: 900px;
            margin: 0 auto;
            padding: 60px 20px;
        }
        .kazoo-lead {
            font-size: 1.05rem;
            line-height: 1.9;
            color: #333;
            text-align: center;
            max-width: 720px;
            margin: 0 auto;
        }
        .kazoo-highlight {
            display: block;
            margin-top: 18px;
            font-weight: bold;
            color: var(--llf-primary);
            font-size: 1.1rem;
        }

        /* --- スクロール連動の3Dシネマティック --- */
        #kazoo-scrolly {
            position: relative;
            height: 340vh;
        }
        #kazoo-sticky {
            position: sticky;
            top: 0;
            height: 100vh;
            overflow: hidden;
            background: radial-gradient(ellipse at 50% 40%, #0c2830 0%, #04121a 55%, #000000 100%);
        }
        #kazoo-canvas {
            width: 100%;
            height: 100%;
            display: block;
        }
        #kazoo-caption {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 9%;
            text-align: center;
            color: #fff;
            font-family: var(--llf-font-heading-en), var(--llf-font-heading-ja);
            font-size: clamp(1.1rem, 2.6vw, 1.7rem);
            letter-spacing: 0.03em;
            text-shadow: 0 2px 14px rgba(0,0,0,0.7);
            padding: 0 24px;
            transition: opacity 0.35s ease;
            pointer-events: none;
        }
        #kazoo-scroll-hint {
            position: absolute;
            left: 50%;
            top: 7%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.75);
            font-size: 0.75rem;
            letter-spacing: 0.2em;
            transition: opacity 0.4s ease;
            pointer-events: none;
        }
        #kazoo-scroll-hint::after {
            content: '';
            display: block;
            width: 1px;
            height: 26px;
            margin: 8px auto 0;
            background: rgba(255,255,255,0.5);
            animation: kazoo-hint-line 1.6s infinite;
        }
        @keyframes kazoo-hint-line {
            0% { transform: scaleY(0); opacity: 0; }
            40% { transform: scaleY(1); opacity: 1; }
            100% { transform: scaleY(1); opacity: 0; }
        }

        /* --- 説明書（折りたたみ） --- */
        .manual-details {
            margin-top: 50px;
        }
        .manual-details summary {
            cursor: pointer;
            text-align: center;
            color: var(--llf-primary);
            font-weight: bold;
            font-size: 0.95rem;
            padding: 12px;
            list-style: none;
        }
        .manual-details summary::-webkit-details-marker {
            display: none;
        }
        .manual-details summary::before {
            content: '📋 ';
        }
        .manual-card {
            background: #111;
            border-radius: 16px;
            padding: 16px;
            margin-top: 16px;
        }
        .manual-card img {
            width: 100%;
            display: block;
            border-radius: 8px;
        }
    </style>
</head>
<body>
    <div id="header-placeholder"></div>

    <div class="kazoo-hero">
        <img src="assets/img/Projects/Kazoo/Kazoo.png" alt="LIFE LOG Factoryオリジナル Kazoo">
        <div class="kazoo-hero-title">
            <h1>Kazoo</h1>
            <p>分解して丸洗いできる、オリジナル膜鳴楽器</p>
        </div>
    </div>

    <section class="kazoo-section">
        <div class="service-header fade-in-target" style="text-align:center; margin-bottom: 10px;">
            <h1 class="service-main-title" style="font-size: 2rem;">About the Project</h1>
            <hr class="divider" style="max-width: 200px; margin: 15px auto 0;">
        </div>
        <p class="kazoo-lead">
            呼吸を使った道具として、膜鳴楽器である「Kazoo」を製作しました。
            <span class="kazoo-highlight">ふつうのカズーとの一番の違いは、3つの部品に分解して丸洗いできること。</span>
            使うたびに清潔に保てて、音を鳴らす膜も身近なポリ袋などで簡単に張り替えられます。
        </p>

    <section id="kazoo-scrolly">
        <div id="kazoo-sticky">
            <canvas id="kazoo-canvas"></canvas>
            <div id="kazoo-caption">3Dモデルを読み込み中...</div>
            <div id="kazoo-scroll-hint">SCROLL</div>
        </div>
    </section>

    <section class="kazoo-section">
        <details class="manual-details">
            <summary>くわしい組み立て方・お手入れ方法を見る</summary>
            <div class="manual-card">
                <img src="assets/img/Projects/Kazoo/説明書.png" alt="LIFE LOG Factoryオリジナル「Kazoo」説明書：部品一覧・組み立て方・使い方・メンテナンス・ご使用上の注意">
            </div>
        </details>
    </section>

    <div class="fade-in-target" style="max-width: 900px; margin: 0 auto; padding: 0 20px 60px; text-align: right;">
        <a href="index.html" class="more-link">>>Home</a>
    </div>

    <div id="footer-placeholder"></div>
    <script src="./assets/js/script.js" defer></script>

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        const stickyEl = document.getElementById('kazoo-sticky');
        const canvas = document.getElementById('kazoo-canvas');
        const captionEl = document.getElementById('kazoo-caption');
        const hintEl = document.getElementById('kazoo-scroll-hint');
        const scrollySection = document.getElementById('kazoo-scrolly');

        if (!window.WebGLRenderingContext) {
            captionEl.textContent = 'お使いの環境では3D表示に対応していません。';
        } else {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 2000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const group = new THREE.Group();
            scene.add(group);

            scene.add(new THREE.AmbientLight(0xffffff, 0.55));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(60, 90, 70);
            scene.add(keyLight);
            const fillLight = new THREE.DirectionalLight(0x66c7d6, 0.55);
            fillLight.position.set(-70, 30, -50);
            scene.add(fillLight);
            const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
            rimLight.position.set(0, -60, -80);
            scene.add(rimLight);

            const loader = new STLLoader();
            const parts = {};
            const rings = [];
            const basePath = 'assets/img/Projects/Kazoo/';
            let maxDim = 100;
            let ready = false;

            function loadPart(name, file, color, opacity) {
                return new Promise((resolve) => {
                    loader.load(basePath + file, (geometry) => {
                        // 部品B（土台）が下、部品A・カバーが上になるように向きを反転
                        geometry.rotateZ(Math.PI);
                        const material = new THREE.MeshStandardMaterial({
                            color,
                            roughness: 0.5,
                            metalness: 0.08,
                            transparent: opacity < 1,
                            opacity
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        group.add(mesh);
                        parts[name] = mesh;
                        resolve(mesh);
                    });
                });
            }

            Promise.all([
                loadPart('base', 'kazooA10_1.stl', 0xAACDD3, 1),
                loadPart('slide', 'kazooA10_2.stl', 0x00687A, 1),
                loadPart('cover', 'kazooB2.stl', 0xE3EEF0, 0.95)
            ]).then(() => {
                // 部品の長さ方向(モデルのZ軸)を画面の横方向に見せる
                group.rotation.y = Math.PI / 2;

                const box = new THREE.Box3().setFromObject(group);
                const center = box.getCenter(new THREE.Vector3());
                group.position.sub(center);

                const size = box.getSize(new THREE.Vector3());
                maxDim = Math.max(size.x, size.y, size.z);

                // 息を吹きかける「吹き口」側（部品Aの根元）に音の輪を追加
                const ringAnchor = new THREE.Group();
                ringAnchor.position.set(0, 1, -3);
                parts.slide.add(ringAnchor);
                for (let i = 0; i < 3; i++) {
                    const ring = new THREE.Mesh(
                        new THREE.RingGeometry(1, 1.6, 32),
                        new THREE.MeshBasicMaterial({
                            color: 0x8ebcc4,
                            transparent: true,
                            opacity: 0,
                            side: THREE.DoubleSide,
                            depthWrite: false
                        })
                    );
                    ringAnchor.add(ring);
                    rings.push(ring);
                }

                ready = true;
                resize();
            });

            function resize() {
                const w = stickyEl.clientWidth;
                const h = stickyEl.clientHeight;
                if (!w || !h) return;
                camera.aspect = w / h;
                camera.updateProjectionMatrix();
                renderer.setSize(w, h, false);
            }
            window.addEventListener('resize', resize);
            resize();

            function getProgress() {
                const rect = scrollySection.getBoundingClientRect();
                const total = scrollySection.offsetHeight - window.innerHeight;
                if (total <= 0) return 0;
                return Math.min(1, Math.max(0, -rect.top / total));
            }

            let lastCaption = '';
            function setCaption(text) {
                if (text === lastCaption) return;
                lastCaption = text;
                captionEl.style.opacity = 0;
                setTimeout(() => {
                    captionEl.textContent = text;
                    captionEl.style.opacity = 1;
                }, 180);
            }

            function tick(timeMs) {
                requestAnimationFrame(tick);
                if (!ready) {
                    renderer.render(scene, camera);
                    return;
                }

                const progress = getProgress();
                hintEl.style.opacity = progress > 0.03 ? 0 : 1;

                // 組み立て/分解: progressが0.6に達するまでに完全に組み立てる
                const assembleP = Math.min(1, progress / 0.6);
                const explodeAmt = 1 - assembleP;
                if (parts.slide) parts.slide.position.z = -explodeAmt * 70;
                if (parts.cover) {
                    parts.cover.position.z = -explodeAmt * 70;
                    parts.cover.position.y = explodeAmt * 16;
                }

                // カメラ: 分解時に広がる幅と、画面のアスペクト比(縦長スマホ等)も考慮して距離を決める
                const azimuth = progress * Math.PI * 2;
                const elevation = 0.32 * Math.cos(progress * Math.PI * 2);
                const extent = maxDim / 2 + explodeAmt * 70;
                const vFovHalf = THREE.MathUtils.degToRad(camera.fov) / 2;
                const hFovHalf = Math.atan(Math.tan(vFovHalf) * camera.aspect);
                const fitTan = Math.min(Math.tan(vFovHalf), Math.tan(hFovHalf));
                const dist = (extent / fitTan) * 1.2;
                camera.position.set(
                    Math.sin(azimuth) * dist * Math.cos(elevation),
                    dist * Math.sin(elevation),
                    Math.cos(azimuth) * dist * Math.cos(elevation)
                );
                camera.lookAt(0, 0, 0);

                // 息を吹きかける演出: 組み立て完了後、音の輪を鳴らす
                const blowP = Math.max(0, Math.min(1, (progress - 0.72) / 0.28));
                const t = timeMs * 0.001;
                rings.forEach((ring, i) => {
                    if (blowP <= 0.01) { ring.visible = false; return; }
                    ring.visible = true;
                    const phase = ((t * 0.5) + i / rings.length) % 1;
                    ring.scale.setScalar(1 + phase * 5);
                    ring.material.opacity = blowP * (1 - phase) * 0.7;
                });

                if (progress < 0.04) setCaption('分解して丸洗いできる、清潔なKazoo');
                else if (progress < 0.35) setCaption('部品Aをスライドさせて…');
                else if (progress < 0.6) setCaption('膜をかぶせて、カバーをはめる');
                else if (progress < 0.72) setCaption('組み立て完了');
                else setCaption('息を吹きかけると、やさしい音が鳴る');

                renderer.render(scene, camera);
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
