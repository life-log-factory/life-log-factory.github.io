        .bg-pos-center { top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 20vw; }

        .bg-pos-left   { top: 62%; left: -3%; font-size: 15vw; }
        .bg-pos-top    { top: 6%; left: 50%; transform: translateX(-50%); font-size: 12vw; }

        #kazoo-scroll-hint {

        @keyframes kazoo-hint-line {

    <script type="importmap">
    {
        "imports": {
            "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
            "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/"
        }
    }
    </script>
    <script type="module">
        import * as THREE from 'three';
        import { STLLoader } from 'three/addons/loaders/STLLoader.js';

        const stickyEl = document.getElementById('kazoo-sticky');
        const canvas = document.getElementById('kazoo-canvas');
        const bgWordEl = document.getElementById('kazoo-bg-word');
        const hintEl = document.getElementById('kazoo-scroll-hint');
        const scrollySection = document.getElementById('kazoo-scrolly');

        // シーケンスの節目（0〜1のスクロール進行度）
        const STAGE = { A: 0.15, B: 0.28, C: 0.42, R: 0.52, D: 0.66, E: 0.74, F: 1.0 };

        function stageT(p, a, b) {
            return Math.min(1, Math.max(0, (p - a) / (b - a)));
        }
        function easeInOut(t) {
            return t * t * (3 - 2 * t);
        }

        if (!window.WebGLRenderingContext) {
            bgWordEl.textContent = '3D非対応';
            bgWordEl.className = 'bg-pos-center';
            bgWordEl.style.opacity = 1;
        } else {
            const scene = new THREE.Scene();
            const camera = new THREE.PerspectiveCamera(38, 1, 0.1, 2000);
            const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
            renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));

            const group = new THREE.Group();
            scene.add(group);

            scene.add(new THREE.AmbientLight(0xffffff, 0.55));
            const keyLight = new THREE.DirectionalLight(0xffffff, 1.2);
            keyLight.position.set(60, 90, 70);
            scene.add(keyLight);
            const fillLight = new THREE.DirectionalLight(0x66c7d6, 0.55);
            fillLight.position.set(-70, 30, -50);
            scene.add(fillLight);
            const rimLight = new THREE.DirectionalLight(0xffffff, 0.4);
            rimLight.position.set(0, -60, -80);
            scene.add(rimLight);

            const loader = new STLLoader();
            const parts = {};
            const soundRings = [];
            const breathRings = [];
            const basePath = 'assets/img/Projects/Kazoo/';
            let ready = false;
            let localCenter = new THREE.Vector3();
            let radiusBase = 60, radiusBaseSlide = 80, radiusFull = 100;

            // 縦向き（土台のロゴ面をカメラに向けた状態）と、通常の横向き
            // 幅広の端を上、ノッチのある端を下にするため、ロゴを見せる向きに
            // さらにカメラ視線軸(Z)まわりに180度の回転を重ねる
            const qVertical = new THREE.Quaternion()
                .setFromAxisAngle(new THREE.Vector3(0, 0, 1), Math.PI)
                .multiply(new THREE.Quaternion().setFromEuler(new THREE.Euler(-Math.PI / 2, 0, 0)));
            const qHorizontal = new THREE.Quaternion().setFromEuler(new THREE.Euler(0, Math.PI / 2, 0));

            function loadPart(name, file, color, opacity) {
                return new Promise((resolve) => {
                    loader.load(basePath + file, (geometry) => {
                        // 部品B（土台）が下、部品A・カバーが上になるように向きを反転
                        geometry.rotateZ(Math.PI);
                        const material = new THREE.MeshStandardMaterial({
                            color,
                            roughness: 0.5,
                            metalness: 0.08,
                            transparent: opacity < 1,
                            opacity
                        });
                        const mesh = new THREE.Mesh(geometry, material);
                        group.add(mesh);
                        parts[name] = mesh;
                        resolve(mesh);
                    });
                });
            }

            function makeRing(color, inner, outer) {
                return new THREE.Mesh(
                    new THREE.RingGeometry(inner, outer, 32),
                    new THREE.MeshBasicMaterial({
                        color,
                        transparent: true,
                        opacity: 0,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    })
                );
            }

            Promise.all([
                loadPart('base', 'kazooA10_1.stl', 0xAACDD3, 1),
                loadPart('slide', 'kazooA10_2.stl', 0x00687A, 1),
                loadPart('cover', 'kazooB2.stl', 0xE3EEF0, 0.95)
            ]).then(() => {
                // カメラは終始「固定の中心」を見続け、パーツ自体が画面外から動いてくる
                // 演出にするため、静止状態(オフセット0)のジオメトリから半径を先に求めておく
                const restFull = new THREE.Box3().setFromObject(group);
                localCenter = restFull.getCenter(new THREE.Vector3());
                radiusFull = restFull.getBoundingSphere(new THREE.Sphere()).radius;

                const restBase = new THREE.Box3().setFromObject(parts.base);
                radiusBase = restBase.getBoundingSphere(new THREE.Sphere()).radius;

                const restBaseSlide = restBase.clone().union(new THREE.Box3().setFromObject(parts.slide));
                radiusBaseSlide = restBaseSlide.getBoundingSphere(new THREE.Sphere()).radius;

                // 声を吹き込む「吹き口」側（部品Aの根元）に、吸い込まれるような輪を追加
                const slideBox = new THREE.Box3().setFromObject(parts.slide);
                const breathAnchor = new THREE.Group();
                breathAnchor.position.set(
                    (slideBox.min.x + slideBox.max.x) / 2,
                    (slideBox.min.y + slideBox.max.y) / 2,
                    slideBox.min.z - 2
                );
                parts.slide.add(breathAnchor);
                for (let i = 0; i < 3; i++) {
                    const ring = makeRing(0x8ebcc4, 1, 1.8);
                    breathAnchor.add(ring);
                    breathRings.push(ring);
                }

                // 音が鳴る「カバー」側から、外に広がる音の輪を追加
                const coverBox = new THREE.Box3().setFromObject(parts.cover);
                const soundAnchor = new THREE.Group();
                soundAnchor.position.set(
                    (coverBox.min.x + coverBox.max.x) / 2,
                    coverBox.max.y + 1,
                    (coverBox.min.z + coverBox.max.z) / 2
                );
                soundAnchor.rotation.x = Math.PI / 2;
                parts.cover.add(soundAnchor);
                for (let i = 0; i < 4; i++) {
                    const ring = makeRing(0x00687A, 1, 2.2);
                    soundAnchor.add(ring);
                    soundRings.push(ring);
                }

                // 部品Aとカバーの間に張る「膜」（ポリ袋のイメージ）
                const membraneRadius = ((coverBox.max.x - coverBox.min.x) / 2) * 0.85;
                const membrane = new THREE.Mesh(
                    new THREE.CircleGeometry(membraneRadius, 24),
                    new THREE.MeshStandardMaterial({
                        color: 0xffffff,
                        transparent: true,
                        opacity: 0,
                        roughness: 0.2,
                        metalness: 0,
                        side: THREE.DoubleSide,
                        depthWrite: false
                    })
                );
                membrane.rotation.x = Math.PI / 2;
                membrane.position.set(
                    (coverBox.min.x + coverBox.max.x) / 2,
                    coverBox.min.y + 0.3,
                    (coverBox.min.z + coverBox.max.z) / 2
                );
                parts.slide.add(membrane);
                parts.membrane = membrane;

                ready = true;
                resize();
            });

            function resize() {
                const w = stickyEl.clientWidth;
                const h = stickyEl.clientHeight;
                if (!w || !h) return;
                camera.aspect = w / h;
                // 縦長の画面ほど水平FOVが極端に狭くなり寄りすぎてしまうため、
                // アスペクト比が1未満のときはFOV自体を広げて画面比の影響を和らげる
                camera.fov = THREE.MathUtils.clamp(38 / camera.aspect, 38, 75);
                camera.updateProjectionMatrix();
                renderer.setSize(w, h, false);
            }
            window.addEventListener('resize', resize);
            resize();

            function getProgress() {
                const rect = scrollySection.getBoundingClientRect();
                const total = scrollySection.offsetHeight - window.innerHeight;
                if (total <= 0) return 0;
                return Math.min(1, Math.max(0, -rect.top / total));
            }

            let lastBgWord = '';
            let lastBgPos = '';
            function setBgWord(text, pos) {
                if (text === lastBgWord && pos === lastBgPos) return;
                lastBgWord = text;
                lastBgPos = pos;
                bgWordEl.style.opacity = 0;
                setTimeout(() => {
                    bgWordEl.textContent = text;
                    bgWordEl.className = pos;
                    bgWordEl.style.opacity = text ? 1 : 0;
                }, 180);
            }

            function tick(timeMs) {
                requestAnimationFrame(tick);
                if (!ready) {
                    renderer.render(scene, camera);
                    return;
                }

                const progress = getProgress();
                hintEl.style.opacity = progress > 0.02 ? 0 : 1;
                const t = timeMs * 0.001;

                // 向き: 最初は縦向き(ロゴが見える)、A→Bの間で横向きへ滑らかに変化
                const orientT = easeInOut(stageT(progress, STAGE.A, STAGE.B));
                group.quaternion.copy(qVertical).slerp(qHorizontal, orientT);

                // 中心を原点に置く。回転してから平行移動するため、中心点も現在の
                // 向き(group.quaternion)で回転させてから打ち消す必要がある
                // （回転前のオフセットのままだと、横向きになったときに中心がずれる）
                group.position.copy(localCenter).applyQuaternion(group.quaternion).multiplyScalar(-1);

                // 土台が下から上がってくる（Aの間だけ画面外相当まで大きくオフセット）
                const riseT = easeInOut(stageT(progress, 0, STAGE.A));
                const introRise = (1 - riseT) * radiusBase * 2.4;
                group.position.y -= introRise;

                // 部品Aが画面外(左)からスライドしてきて合体（B→C）。土台の向きが確定する
                // Bまでは非表示にしておく（回転中は「画面外」オフセットの向きも一緒に
                // 回ってしまい、意図せず画面内に入ってしまうため）
                // ローカルZ軸が画面の水平方向(ワールドX)に対応するため、Z方向に動かす
                parts.slide.visible = progress >= STAGE.B;
                const slideT = easeInOut(stageT(progress, STAGE.B, STAGE.C));
                parts.slide.position.set(0, 0, -(1 - slideT) * radiusBaseSlide * 2.6);

                // 膜（部品Aとカバーの間）: カバーが降りてくる前半で先に張られる
                const membraneT = easeInOut(stageT(progress, STAGE.R, STAGE.R + (STAGE.D - STAGE.R) * 0.5));
                if (parts.membrane) parts.membrane.material.opacity = membraneT * 0.4;

                // カバーが画面外(真上)から真下に降りてきてはまる（R→D）。膜が張られた後に登場
                parts.cover.visible = progress >= STAGE.R;
                const coverT = easeInOut(stageT(progress, STAGE.R, STAGE.D));
                parts.cover.position.set(0, (1 - coverT) * radiusFull * 2.2, 0);

                // カメラは常に中心(原点)を見続ける。パーツの一時的な移動に追随させると
                // 「画面外から来る」演出が相殺されてしまうため、半径は見せ場ごとの
                // 静止状態の値(radiusBase→radiusBaseSlide→radiusFull)を使う
                let radius;
                if (progress < STAGE.B) radius = radiusBase;
                else if (progress < STAGE.D) radius = radiusBaseSlide;
                else radius = radiusFull;
                const target = new THREE.Vector3(0, 0, 0);

                // カメラの向き: 組み立て中は正面固定（斜めだとスライドが斜めに見えるため）、
                // 少し見下ろす角度でカバー側も見えるようにする。C→Rでスライドとカバーの
                // 間に一度だけ半回転し、R→Dで保持、D→Eで短く元の正面へ戻す
                const baseElevation = 0.227; // 約13度、以前より5度ほど深め
                let azimuth = 0;
                let elevation = baseElevation;
                if (progress >= STAGE.C && progress < STAGE.R) {
                    const rT = stageT(progress, STAGE.C, STAGE.R);
                    azimuth = easeInOut(rT) * Math.PI;
                    // 真横向き(90度)になる瞬間は薄い板が消えて見えるため、その間だけ
                    // 見下ろす角度を強めて上面が見えるようにする
                    elevation = baseElevation + 0.5 * Math.sin(rT * Math.PI);
                } else if (progress >= STAGE.R && progress < STAGE.D) {
                    azimuth = Math.PI;
                } else if (progress >= STAGE.D && progress < STAGE.E) {
                    azimuth = Math.PI + easeInOut(stageT(progress, STAGE.D, STAGE.E)) * Math.PI;
                } else if (progress >= STAGE.E) {
                    azimuth = Math.PI * 2;
                }

                const vFovHalf = THREE.MathUtils.degToRad(camera.fov) / 2;
                const hFovHalf = Math.atan(Math.tan(vFovHalf) * camera.aspect);
                // 常に全体が収まる方(狭い方)に合わせる。画面比が変わったときの寄り方の
                // 差はresize()側でFOVそのものを調整して和らげている
                const fitTan = Math.min(Math.tan(vFovHalf), Math.tan(hFovHalf));
                // Aの間は土台を大きく見せるため寄り気味に、それ以外は少し余裕を持たせる
                const margin = progress < STAGE.A ? 1.05 : 1.4;
                let dist = (radius / fitTan) * margin;
                if (progress >= STAGE.E) dist *= 1 - 0.15 * stageT(progress, STAGE.E, STAGE.F);

                camera.position.set(
                    target.x + Math.sin(azimuth) * dist * Math.cos(elevation),
                    target.y + dist * Math.sin(elevation),
                    target.z + Math.cos(azimuth) * dist * Math.cos(elevation)
                );
                camera.lookAt(target);

                // 声を吹き込む→カバーから音が鳴る、の2段階演出（Fの間ずっと重ねて表示）
                const breathP = stageT(progress, STAGE.E, STAGE.F);
                breathRings.forEach((ring, i) => {
                    if (breathP <= 0.01) { ring.visible = false; return; }
                    ring.visible = true;
                    const phase = ((t * 0.7) + i / breathRings.length) % 1;
                    ring.scale.setScalar(1.8 - phase * 1.1); // 吸い込まれるように縮む
                    ring.material.opacity = breathP * phase * 0.85;
                });
                const soundP = stageT(progress, STAGE.E, STAGE.F);
                soundRings.forEach((ring, i) => {
                    if (soundP <= 0.01) { ring.visible = false; return; }
                    ring.visible = true;
                    const phase = ((t * 0.55) + i / soundRings.length) % 1;
                    ring.scale.setScalar(1 + phase * 6); // 音が広がるように大きくなる
                    ring.material.opacity = soundP * (1 - phase) * 0.9;
                });

                // 背景の大きな文字
                if (progress < STAGE.A) {
                    setBgWord('Kazoo', 'bg-pos-center');
                } else if (progress < STAGE.C) {
                    setBgWord('SLIDE', 'bg-pos-right');
                } else if (progress < STAGE.D) {
                    setBgWord('COVER', 'bg-pos-left');
                } else if (progress < STAGE.E) {
                    setBgWord('', 'bg-pos-center');
                } else {
                    setBgWord('Kazoo', 'bg-pos-center');
                }

                renderer.render(scene, camera);
            }
            requestAnimationFrame(tick);
        }
    </script>
</body>
</html>
